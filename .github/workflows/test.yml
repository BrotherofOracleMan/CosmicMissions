name: Test

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cosmic_missions_test_db
  TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cosmic_missions_test_db

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Install psql linux client and run commands to create db
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE cosmic_missions_test_db;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d cosmic_missions_test_db -f sql_files/create_cosmic_missions_table.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d cosmic_missions_test_db -f sql_files/create_crew_members_table.sql

      - name: Run tests
        run: uv run pytest
